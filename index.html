<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudySpark</title>

    <link rel="stylesheet" href="style.css" />

    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="container">
      <h1>StudySpark</h1>
      <p id="progress">1 of 3</p>

      <div class="card-container" id="card-trigger">
        <div class="card" id="card-inner">
          <div class="card-face card-front">
            <p class="label">Question</p>
            <h2 id="question-text">What does HTML stand for?</h2>
            <span class="hint">Click to flip</span>
          </div>

          <div class="card-face" id="card-back">
            <p class="label">Answer</p>
            <h2 id="question-answer">HyperText Markup Language</h2>
            <span class="hint">Click to flip</span>
          </div>
        </div>
      </div>

      <div class="navigation-btns">
        <button id="prev-btn">Previous</button>
        <button id="next-btn">Next</button>
      </div>
    </div>
  </body>
</html>
